services:
  patent-api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  qdrant_data:
